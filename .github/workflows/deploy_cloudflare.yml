name: Deploy site to Cloudflare Pages

on:
  push:
    branches: [master]
    paths:
      - "site/**"
      - "skills/**"
      - "tools/**"
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: vars.CF_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install root dependencies and export skills
        run: |
          npm ci
          npm run export

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Sync data & generate sitemap
        working-directory: site
        run: |
          npm run sync-data
          npm run gen-sitemap

      - name: Build site (Cloudflare — root base path)
        working-directory: site
        env:
          SITE_URL: "https://openskill.pages.dev"
          BASE_PATH: "/"
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=openskill
