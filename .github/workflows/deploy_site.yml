name: Deploy site to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "site/**"
      - "skills/**"
      - "tools/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install root dependencies and export skills
        run: |
          npm ci
          npm run export

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Sync data
        working-directory: site
        run: npm run sync-data

      - name: Build site
        working-directory: site
        run: npm run build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
