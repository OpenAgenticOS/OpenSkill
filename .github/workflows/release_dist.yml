# Build dist/openskill*.json and attach to a GitHub Release when a version tag is pushed.
# Usage: git tag v1.0.0 && git push origin v1.0.0
# Requires: repo Settings → Actions → Workflow permissions → Read and write.

name: Release · dist bundle

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-dist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Export skills and publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate skills
        run: npm run validate

      - name: Export openskill.json (full + zh + en + progressive + MCP resources)
        run: npm run export:all
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Create zip bundles
        run: |
          cd dist
          zip -9 "../openskill-dist-${{ github.ref_name }}.zip" openskill.json openskill.zh.json openskill.en.json openskill.workflows.json openskill.recipes.json openskill.progressive.json openskill.mcp-resources.json
          zip -9 "../openskill-zh-${{ github.ref_name }}.zip" openskill.zh.json
          zip -9 "../openskill-en-${{ github.ref_name }}.zip" openskill.en.json

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenSkill ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            **Artifacts · 制品**
            - `openskill.json` — full records + optional locale split fields (`format_version: 2`)
            - `openskill.zh.json` — `locale: zh`, COSTAR/`system_prompt` resolved for Chinese
            - `openskill.en.json` — `locale: en`, English side
            - `openskill.workflows.json` / `openskill.recipes.json` — declarative workflows & role recipes (`format_version: 1`)
            - `openskill.progressive.json` / `openskill.mcp-resources.json` — progressive disclosure & experimental MCP-style URIs (`format_version: 1`)
            - `openskill-dist-${{ github.ref_name }}.zip` — skills + workflows + recipes + progressive + MCP JSON files
            - `openskill-zh-${{ github.ref_name }}.zip` / `openskill-en-${{ github.ref_name }}.zip` — single-locale JSON

            **Latest downloads · 最新下载**
            - Full: `https://github.com/${{ github.repository }}/releases/latest/download/openskill.json`
            - zh: `https://github.com/${{ github.repository }}/releases/latest/download/openskill.zh.json`
            - en: `https://github.com/${{ github.repository }}/releases/latest/download/openskill.en.json`

            **Zip bundles (this tag) · 压缩包（本标签）**
            - All three JSONs: `https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/openskill-dist-${{ github.ref_name }}.zip`
            - zh only: `https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/openskill-zh-${{ github.ref_name }}.zip`
            - en only: `https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/openskill-en-${{ github.ref_name }}.zip`

            Published from **${{ github.repository }}** (owner: **${{ github.repository_owner }}**).
          files: |
            dist/openskill.json
            dist/openskill.zh.json
            dist/openskill.en.json
            dist/openskill.workflows.json
            dist/openskill.recipes.json
            dist/openskill.progressive.json
            dist/openskill.mcp-resources.json
            openskill-dist-${{ github.ref_name }}.zip
            openskill-zh-${{ github.ref_name }}.zip
            openskill-en-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
