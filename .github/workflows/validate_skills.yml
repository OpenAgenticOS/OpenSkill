name: 🔍 Validate Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**/*.skill.md'
      - 'schema/**'
      - 'tools/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - '.markdownlint-cli2.yaml'
      - '.devcontainer/**'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**/*.skill.md'
      - 'schema/**'
      - 'tools/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - '.markdownlint-cli2.yaml'
      - '.devcontainer/**'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-skills:
    name: Validate Skill Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate all skill files
        run: npm run validate
        env:
          CI: true

      - name: Count skills per category
        if: always()
        run: node tools/count_skills.js

      - name: Regenerate skill index and check for drift
        run: |
          npm run build-index
          git diff --exit-code docs/SKILL_INDEX.md

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules/**
            !**/CHANGELOG.md

  check-new-skills:
    name: Check New Skill PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed skill files
        id: changed
        uses: tj-actions/changed-files@v44
        with:
          files: 'skills/**/*.skill.md'

      - name: Comment PR with skill summary
        if: steps.changed.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const files = `${{ steps.changed.outputs.all_changed_files }}`.split(' ');
            const skillList = files.map(f => `- \`${f}\``).join('\n');
            
            const body = `## 🤖 OpenSkill CI Report
            
            ### Modified Skill Files · 变更的技能文件
            ${skillList}
            
            ### Validation Status · 校验状态
            ✅ Schema validation passed · Schema 格式校验通过
            
            ### Review Checklist · 评审清单
            - [ ] Skill 是否为原子级任务（一个 Skill 只做一件事）?
            - [ ] 是否包含中英文双语内容?
            - [ ] 系统提示词是否清晰可用?
            - [ ] 是否有真实的输出示例?
            - [ ] 是否在正确的目录分类下?
            
            Thanks for contributing! 感谢你的贡献！🎉`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
