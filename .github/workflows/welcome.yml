name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            感谢打开这个 Issue！维护者会尽快查看。

            - 贡献技能或改进流程：请阅读 [CONTRIBUTING.md](https://github.com/OpenAgenticOS/OpenSkill/blob/master/CONTRIBUTING.md)
            - 本地校验（可选）：`npm ci` 后运行 `npm run validate`

            Thank you for opening an issue! Maintainers will take a look soon.

            - To contribute skills or tooling: see [CONTRIBUTING.md](https://github.com/OpenAgenticOS/OpenSkill/blob/master/CONTRIBUTING.md)
            - Optional local check: `npm ci` then `npm run validate`
          pr-message: |
            感谢你的 Pull Request！

            - CI 会自动运行 Schema 校验与 Markdown lint
            - 贡献指南：[CONTRIBUTING.md](https://github.com/OpenAgenticOS/OpenSkill/blob/master/CONTRIBUTING.md)
            - 可选：本地执行 `npm ci` 与 `npm run validate`

            Thank you for your pull request!

            - CI runs schema validation and Markdown lint automatically
            - Contributor guide: [CONTRIBUTING.md](https://github.com/OpenAgenticOS/OpenSkill/blob/master/CONTRIBUTING.md)
            - Optional: run `npm ci` and `npm run validate` locally
