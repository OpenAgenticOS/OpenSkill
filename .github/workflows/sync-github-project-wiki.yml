# 1) 始终写入 docs/wiki-mirror/ 并用 GITHUB_TOKEN 提交（无需 PAT 即可在网页阅读）
# 2) 若设置 PROJECTS_WIKI_PAT：额外 push 到 GitHub Wiki；若再设置 PROJECT_NUMBER：同步 Project v2 草稿

name: Sync Wiki & Project

on:
  push:
    branches: [master]
    paths:
      - "data/roadmap.json"
      - "tools/sync_github.mjs"
      - "skills/**/*.skill.md"
      - ".github/workflows/sync-github-project-wiki.yml"
    paths-ignore:
      - "docs/wiki-mirror/**"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: sync-wiki-project
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate wiki mirror + optional Wiki git + Project
        env:
          WRITE_MIRROR: "1"
          PROJECTS_WIKI_PAT: ${{ secrets.PROJECTS_WIKI_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROJECT_OWNER: ${{ github.repository_owner }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
        run: node tools/sync_github.mjs

      - name: Commit wiki mirror to default branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/wiki-mirror/
          if git diff --staged --quiet; then
            echo "No wiki-mirror changes."
            exit 0
          fi
          git commit -m "chore(docs): sync wiki mirror [skip ci]"
          git push
