# Pushes auto-generated content to GitHub Wiki + adds missing roadmap rows as Project v2 draft issues.
# 需要 Secrets: PROJECTS_WIKI_PAT（Fine-grained 或 classic PAT，勾选 repo、read:org、project 权限）
# 需要 Variables（可选）: PROJECT_NUMBER = Project v2 在 owner 下的编号（组织或用户登录名 = 仓库 owner，即 github.repository_owner）

name: Sync Wiki & Project

on:
  push:
    branches: [master]
    paths:
      - "data/roadmap.json"
      - "tools/sync_github.mjs"
      - "skills/**/*.skill.md"
      - ".github/workflows/sync-github-project-wiki.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: sync-wiki-project
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync Wiki & GitHub Project
        env:
          SYNC_GITHUB_TOKEN: ${{ secrets.PROJECTS_WIKI_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROJECT_OWNER: ${{ github.repository_owner }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
        run: node tools/sync_github.mjs
