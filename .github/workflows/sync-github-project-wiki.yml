# 1) 始终写入 docs/wiki-mirror/ 并用 GITHUB_TOKEN 提交（无需 PAT 即可在网页阅读）
# 2) 若设置 PROJECTS_WIKI_PAT：额外 push 到 GitHub Wiki；若再设置 PROJECT_NUMBER：同步 Project v2 草稿

name: Sync Wiki & Project

# 不在此使用 paths-ignore：若单次提交同时改 skills 与 wiki-mirror，paths-ignore 会导致整单被跳过。
# 镜像提交信息含 [skip ci]，不会再次触发本工作流。
on:
  push:
    branches: [master]
    paths:
      - "data/roadmap.json"
      - "tools/sync_github.mjs"
      - "skills/**/*.skill.md"
      - ".github/workflows/sync-github-project-wiki.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: sync-wiki-project
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate wiki mirror + optional Wiki git + Project
        env:
          WRITE_MIRROR: "1"
          PROJECTS_WIKI_PAT: ${{ secrets.PROJECTS_WIKI_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROJECT_OWNER: ${{ github.repository_owner }}
          # 未设置仓库 Variable 时默认 1（与 org/user 下首个 Project 常见编号一致，可用 Variable 覆盖）
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER || '1' }}
        run: node tools/sync_github.mjs

      - name: Commit wiki mirror to default branch
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/wiki-mirror/
          if git diff --staged --quiet; then
            echo "No wiki-mirror changes."
            exit 0
          fi
          git commit -m "chore(docs): sync wiki mirror [skip ci]"
          git pull --rebase origin "$BRANCH"
          git push origin "HEAD:${BRANCH}"
